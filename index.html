<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI & Tech Investment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2035;
  --card-bg:rgba(30,41,66,0.7);--card-border:rgba(255,255,255,0.08);
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
  --accent:#6366f1;--accent2:#8b5cf6;
  --t0:#ef4444;--t1:#f97316;--t2:#3b82f6;--t3:#6b7280;
  --green:#10b981;--sidebar-w:260px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.header{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);display:flex;align-items:center;padding:0 24px;z-index:100}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{font-size:12px;color:var(--text-muted);margin-left:12px}
.header .search-box{margin-left:auto;position:relative}
.header .search-box input{background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:8px 16px 8px 36px;color:var(--text);font-size:13px;width:280px;outline:none;transition:border .2s}
.header .search-box input:focus{border-color:var(--accent)}
.header .search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}

/* Stats Bar */
.stats-bar{position:fixed;top:64px;left:var(--sidebar-w);right:0;height:52px;background:rgba(17,24,39,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border);display:flex;align-items:center;padding:0 24px;gap:32px;z-index:90}
.stat-item{display:flex;align-items:center;gap:8px;font-size:13px}
.stat-item .stat-val{font-weight:700;font-size:16px}
.stat-item .stat-label{color:var(--text-muted);font-size:11px}
.stat-item.accent .stat-val{color:var(--accent)}
.stat-item.green .stat-val{color:var(--green)}
.stat-item.red .stat-val{color:var(--t0)}

/* Sidebar */
.sidebar{position:fixed;top:64px;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--card-border);overflow-y:auto;z-index:80;padding:16px 0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px}
.sidebar .mode-toggle{display:flex;margin:0 12px 16px;background:var(--bg);border-radius:8px;padding:3px}
.sidebar .mode-toggle button{flex:1;padding:6px 0;border:none;background:none;color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;transition:all .2s}
.sidebar .mode-toggle button.active{background:var(--accent);color:#fff}
.sidebar .nav-section{padding:0 8px}
.sidebar .nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s;margin-bottom:2px}
.sidebar .nav-item:hover{background:rgba(99,102,241,0.1);color:var(--text)}
.sidebar .nav-item.active{background:rgba(99,102,241,0.2);color:#fff;font-weight:600}
.sidebar .nav-item .count{font-size:11px;background:var(--bg);padding:2px 8px;border-radius:10px;color:var(--text-muted)}
.sidebar .nav-item .icon{margin-right:8px;font-size:16px}

/* Main Content */
.main{margin-left:var(--sidebar-w);margin-top:116px;padding:24px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* Company Card */
.company-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:20px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.company-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
.company-card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,0.3);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.company-card:hover::before{opacity:1}
.company-card.has-card{border-color:rgba(99,102,241,0.15)}
.company-card.has-card::before{opacity:.5}
.company-card.no-card{opacity:.45;filter:saturate(0.3)}
.company-card.no-card:hover{opacity:.65;filter:saturate(0.5);transform:translateY(-2px)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-name{font-size:16px;font-weight:700}
.card-ticker{font-size:12px;color:var(--text-muted);margin-top:2px;font-weight:500}
.card-flag{font-size:22px}
.card-badges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;text-transform:uppercase}
.badge-t0{background:rgba(239,68,68,0.15);color:var(--t0);border:1px solid rgba(239,68,68,0.2)}
.badge-t1{background:rgba(249,115,22,0.15);color:var(--t1);border:1px solid rgba(249,115,22,0.2)}
.badge-t2{background:rgba(59,130,246,0.15);color:var(--t2);border:1px solid rgba(59,130,246,0.2)}
.badge-t3{background:rgba(107,114,128,0.15);color:var(--t3);border:1px solid rgba(107,114,128,0.2)}
.badge-industry{background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}
.badge-private{background:rgba(107,114,128,0.15);color:var(--t3);border:1px solid rgba(107,114,128,0.2)}

.card-market{display:flex;gap:12px;margin-bottom:12px;padding:8px 0;border-top:1px solid var(--card-border);flex-wrap:wrap}
.market-item{font-size:11px}
.market-item .label{color:var(--text-muted);margin-bottom:2px}
.market-item .value{font-weight:600;font-size:14px;color:var(--text)}

.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.card-actions a,.card-actions span{font-size:11px;padding:4px 10px;border-radius:6px;text-decoration:none;background:rgba(99,102,241,0.1);color:#818cf8;border:1px solid rgba(99,102,241,0.15);transition:all .15s;cursor:pointer}
.card-actions a:hover{background:rgba(99,102,241,0.25)}

.coming-soon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:8px 16px;border-radius:8px;font-size:12px;color:var(--text-muted);opacity:0;transition:opacity .2s;pointer-events:none}
.company-card.no-card:hover .coming-soon{opacity:1}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-bar{left:0}
  .card-grid{grid-template-columns:1fr}
}
</style>
</head>

Url": null, "hasCard": false, "section": "Other", "price": null, "priceDisplay": null}];

const FLAG_MAP={US:'🇺🇸',CN:'🇨🇳',TW:'🇹🇼',KR:'🇰🇷',JP:'🇯🇵',NL:'🇳🇱'};
const COUNTRY_NAMES={US:'United States',CN:'China',TW:'Taiwan',KR:'Korea',JP:'Japan',NL:'Netherlands'};
const INDUSTRY_ICONS={'大型科技平台':'🏢','芯片':'💎','Infra/算力云':'☁️','基础模型':'🧠','应用层':'📱','社交/内容':'💬','游戏':'🎮','电商/本地生活':'🛒','出行/自动驾驶':'🚗','消费/零售':'🛍️','招聘/旅游/房产':'🏠','机器人':'🤖'};
const INDUSTRIES=['大型科技平台','芯片','Infra/算力云','基础模型','应用层','社交/内容','游戏','电商/本地生活','出行/自动驾驶','消费/零售','招聘/旅游/房产','机器人'];
const COUNTRIES=['US','CN','TW','KR','JP','NL'];

let viewMode='industry';
let activeFilter='all';
let searchQuery='';

function renderStats(filtered){
  const total=companies.length;
  const active=companies.filter(c=>c.hasCard).length;
  const t0=companies.filter(c=>c.tier==='T0').length;
  const rate=((active/total)*100).toFixed(0);
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-item accent"><div><div class="stat-val">${total}</div><div class="stat-label">Total Tracked</div></div></div>
    <div class="stat-item green"><div><div class="stat-val">${active}</div><div class="stat-label">Active Cards</div></div></div>
    <div class="stat-item red"><div><div class="stat-val">${t0}</div><div class="stat-label">T0 Priority</div></div></div>
    <div class="stat-item"><div><div class="stat-val">${rate}%</div><div class="stat-label">Coverage Rate</div></div></div>
    <div class="stat-item"><div><div class="stat-val">${filtered.length}</div><div class="stat-label">Showing</div></div></div>`;
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let items=[];
  if(viewMode==='industry'){
    items=INDUSTRIES.map(ind=>{
      const cnt=companies.filter(c=>c.industry===ind).length;
      return{key:ind,label:`${INDUSTRY_ICONS[ind]||''} ${ind}`,count:cnt};
    });
  }else{
    items=COUNTRIES.map(c=>{
      const cnt=companies.filter(co=>co.country===c).length;
      return{key:c,label:`${FLAG_MAP[c]} ${COUNTRY_NAMES[c]}`,count:cnt};
    });
  }
  sb.innerHTML=`
    <div class="mode-toggle">
      <button class="${viewMode==='industry'?'active':''}" onclick="setMode('industry')">By Industry</button>
      <button class="${viewMode==='country'?'active':''}" onclick="setMode('country')">By Country</button>
    </div>
    <div class="nav-section">
      <div class="nav-item ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">
        <span>📋 All Companies</span><span class="count">${companies.length}</span>
      </div>
      ${items.map(i=>`
        <div class="nav-item ${activeFilter===i.key?'active':''}" onclick="setFilter('${i.key}')">
          <span>${i.label}</span><span class="count">${i.count}</span>
        </div>
      `).join('')}
    </div>`;
}

function getFiltered(){
  let list=[...companies];
  if(activeFilter!=='all'){
    if(viewMode==='industry') list=list.filter(c=>c.industry===activeFilter);
    else list=list.filter(c=>c.country===activeFilter);
  }
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(c=>c.name.toLowerCase().includes(q)||c.ticker.toLowerCase().includes(q));
  }
  list.sort((a,b)=>{
    if(a.hasCard&&!b.hasCard)return-1;
    if(!a.hasCard&&b.hasCard)return 1;
    const tierOrder={T0:0,T1:1,T2:2,T3:3};
    return(tierOrder[a.tier]||9)-(tierOrder[b.tier]||9);
  });
  return list;
}

function renderCards(){
  const filtered=getFiltered();
  renderStats(filtered);
  const grid=document.getElementById('cardGrid');
  grid.innerHTML=filtered.map(c=>{
    const flag=FLAG_MAP[c.country]||'🌍';
    const isPrivate=c.ticker==='Private';
    const cardClass=c.hasCard?'has-card':'no-card';
    const priceDisplay=c.priceDisplay||'—';
    const marketHtml=isPrivate?
      `<div class="card-market"><div class="market-item"><div class="label">Status</div><div class="value"><span class="badge badge-private">Private</span></div></div></div>`:
      c.hasCard && c.mktCap && c.mktCap!=='—'?
      `<div class="card-market"><div class="market-item"><div class="label">Price</div><div class="value">${priceDisplay}</div></div><div class="market-item"><div class="label">Mkt Cap</div><div class="value">${c.mktCap}</div></div><div class="market-item"><div class="label">Rev (${c.revFY||'FY'})</div><div class="value">${c.rev}</div></div></div>`:
      `<div class="card-market"><div class="market-item"><div class="label">Price</div><div class="value">${priceDisplay}</div></div></div>`;
    const actionsHtml=c.hasCard?`
      <div class="card-actions">
        <a href="${c.cardUrl}" target="_blank" onclick="event.stopPropagation()">📋 Card</a>
        <span>📊 Earnings</span>
        <span>🔍 Deep Dive</span>
      </div>`:'';
    return`
      <div class="company-card ${cardClass}" onclick="${c.hasCard?`window.open('${c.cardUrl}','_blank')`:''}" title="${c.hasCard?'Click to view card':'Coming soon'}">
        <div class="card-top">
          <div><div class="card-name">${c.name}</div><div class="card-ticker">${c.ticker}</div></div>
          <div class="card-flag">${flag}</div>
        </div>
        <div class="card-badges">
          <span class="badge badge-${c.tier.toLowerCase()}">${c.tier}</span>
          <span class="badge badge-industry">${c.subCategory}</span>
        </div>
        ${marketHtml}
        ${actionsHtml}
        ${!c.hasCard?'<div class="coming-soon">🔜 Coming Soon</div>':''}
      </div>`;
  }).join('');
}

function setMode(m){viewMode=m;activeFilter='all';renderSidebar();renderCards();}
function setFilter(f){activeFilter=f;renderSidebar();renderCards();}

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderCards();});

renderSidebar();
renderCards();
</script>
